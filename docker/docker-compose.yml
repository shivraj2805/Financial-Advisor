version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: financial-advisor-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: financial_advisor
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - financial-advisor-network

  # Node.js Server
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: financial-advisor-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGO_URL=mongodb://admin:password123@mongodb:27017/financial_advisor?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=http://localhost:8080/auth/google/callback
    ports:
      - "8080:8080"
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - financial-advisor-network

  # React Client
  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: financial-advisor-client
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - REACT_APP_SOCKET_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - financial-advisor-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: financial-advisor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - client
      - server
    networks:
      - financial-advisor-network

volumes:
  mongodb_data:
    driver: local
  server_uploads:
    driver: local

networks:
  financial-advisor-network:
    driver: bridge
